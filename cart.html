<!DOCTYPE html><html><head><link rel="stylesheet" href="style.css"></head><body><h2>Cart</h2><div id="cart"></div><form id="f"><input required placeholder="Name"><input required placeholder="Phone"><textarea required placeholder="Address"></textarea><button>Complete Payment</button></form><script>let cart=JSON.parse(localStorage.getItem("cart")||"[]");document.getElementById("cart").innerHTML=cart.map(x=>"<p>"+x.name+" - ₹"+x.price+"</p>").join("")||"Cart Empty";document.getElementById("f").onsubmit=function(e){e.preventDefault();let orders=JSON.parse(localStorage.getItem("orders")||"[]");orders.push({date:new Date().toLocaleString(),items:cart});localStorage.setItem("orders",JSON.stringify(orders));localStorage.removeItem("cart");location="success.html";}</script></body></html>
