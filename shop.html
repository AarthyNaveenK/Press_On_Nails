<!DOCTYPE html><html><head><link rel="stylesheet" href="style.css"></head><body><h2>Shop</h2><div id="products" class="grid"></div><script>const products=Array.from({length:10},(_,i)=>({id:i+1,name:"Nail Set "+(i+1),price:499+i*50,image:"https://via.placeholder.com/250?text=Nails"}));document.getElementById("products").innerHTML=products.map(p=>`<div class="card"><img src="${p.image}"><h3>${p.name}</h3><p>₹${p.price}</p><button onclick="add(${p.id})">Add to Cart</button></div>`).join("");function add(id){let c=JSON.parse(localStorage.getItem("cart")||"[]");c.push(products.find(x=>x.id===id));localStorage.setItem("cart",JSON.stringify(c));alert("Added to cart");}</script></body></html>
